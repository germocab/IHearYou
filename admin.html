<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
<title>Panel de administración · Oye</title>
<meta name="theme-color" content="#7C3AED" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="admin-shell">

    <div class="admin-header">
      <h1>Panel de administración</h1>
      <a href="index.html" class="icon-btn small" title="Volver a la app" style="text-decoration:none;">✕</a>
    </div>

    <div class="admin-tabs">
      <button class="admin-tab active" data-tab="create">Nuevo ejercicio</button>
      <button class="admin-tab" data-tab="list">Ejercicios (<span id="countBadge">0</span>)</button>
    </div>

    <!-- ============ TAB: CREAR EJERCICIO ============ -->
    <section id="tab-create">
      <div class="form-card">
        <div class="form-group">
          <label>Nombre del ejercicio (opcional, se usa como retroalimentación)</label>
          <input type="text" id="inputTitle" placeholder="Ej: una fuente con manzanas" />
          <div class="hint">Se mostrará como "Esta es [nombre]" al responder correctamente.</div>
        </div>

        <div class="form-group">
          <label>Imagen del ejercicio</label>
          <input type="file" id="inputImage" accept="image/*" />
          <div class="hint">Formatos permitidos: JPG, PNG, WEBP.</div>
        </div>

        <div class="form-group">
          <label>Alternativas de audio</label>
          <div id="audioInputsContainer"></div>
          <button class="btn btn-secondary" id="btnAddAudio" type="button" style="margin-top:6px;">+ Agregar alternativa</button>
        </div>

        <div class="progress-bar-upload" id="uploadProgress"><div class="fill" id="uploadProgressFill"></div></div>

        <button class="btn btn-primary" id="btnSaveExercise" style="margin-top:10px;">Guardar ejercicio</button>
      </div>
    </section>

    <!-- ============ TAB: LISTA DE EJERCICIOS ============ -->
    <section id="tab-list" style="display:none;">
      <div id="exerciseList"></div>
    </section>

  </div>

  <div class="toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/data-service.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
