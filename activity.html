<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
<title>¿Qué veo? · Oye</title>
<meta name="theme-color" content="#7C3AED" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="app-shell">

    <!-- Barra superior: cerrar + progreso -->
    <div class="topbar">
      <button class="icon-btn" id="btnClose" aria-label="Cerrar actividad">✕</button>
      <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
      <div class="topbar-trailing">
        <button class="icon-btn" id="btnRepeatHint" aria-label="Ayuda" title="Escucha ambos audios antes de responder">?</button>
      </div>
    </div>
    <div class="points-badge" id="pointsBadge" style="display:none;">+5 puntos</div>

    <div class="screen-content" id="screenContent">
      <!-- Se renderiza dinámicamente: loading / ejercicio / vacío -->
    </div>
  </div>

  <!-- SDK de Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/data-service.js"></script>
  <script src="js/activity.js"></script>
</body>
</html>
